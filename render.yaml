# Blueprint Render — Doca Livre WMS PRO
# Produção:  branch main    → https://doca-livre-wms-pro.onrender.com
# Homologação: branch homolog → https://doca-livre-wms-pro-homologacao.onrender.com
#
# Mesmo banco Supabase nos dois serviços (copie DATABASE_URL da produção na homolog).

services:
  # ── Produção ──────────────────────────────────────────────────────────────
  - type: web
    name: doca-livre-wms-pro
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: producao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false

  # ── Homologação ───────────────────────────────────────────────────────────
  - type: web
    name: doca-livre-wms-pro-homologacao
    env: python
    plan: free
    region: oregon
    branch: homolog
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: homologacao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false
