# Blueprint Render — Stock System WMS
# Produção:  branch main    → https://sistema-wms.onrender.com  (Supabase)
# Homologação: branch homolog → https://sistema-wms-homologacao.onrender.com (Postgres Render)
#
# IMPORTANTE: este app é Flask + PostgreSQL → use Web Service (Python), NÃO Static Site.
# Sem Supabase extra para homolog: ver HOMOLOG_SEM_SUPABASE.md

databases:
  # Banco só da homologação (não usa slot do Supabase)
  - name: sistema-wms-homolog-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  # ── Produção ──────────────────────────────────────────────────────────────
  - type: web
    name: sistema-wms
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    # Produção: deploy manual no Render após merge homolog → main validado
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: producao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      # Supabase produção — configure manualmente no painel Render
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false

  # ── Homologação (testes antes de ir para produção) ────────────────────────
  - type: web
    name: sistema-wms-homologacao
    env: python
    plan: free
    region: oregon
    branch: homolog
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: homologacao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-wms-homolog-db
          property: connectionString
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false
