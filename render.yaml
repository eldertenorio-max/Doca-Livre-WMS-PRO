# Blueprint Render — Stock System WMS
# Produção:  branch main    → https://sistema-wms.onrender.com
# Homologação: branch homolog → https://sistema-wms-homologacao.onrender.com
#
# Mesmo banco Supabase nos dois serviços (copie DATABASE_URL da produção na homolog).
# Homolog = Web Service Python (não Static Site — o app tem Flask + APIs + login).

services:
  # ── Produção ──────────────────────────────────────────────────────────────
  - type: web
    name: sistema-wms
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: producao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false

  # ── Homologação (mesmo banco, branch homolog, deploy automático) ──────────
  - type: web
    name: sistema-wms-homologacao
    env: python
    plan: free
    region: oregon
    branch: homolog
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: homologacao
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      # Cole a MESMA DATABASE_URL do serviço sistema-wms (Supabase produção)
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false
