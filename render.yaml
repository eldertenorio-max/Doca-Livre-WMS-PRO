# Blueprint Render — Doca Livre WMS PRO (portal único Light / Plus / Pro)
#
# Produção:    branch main    → https://doca-livre-wms-pro.onrender.com
# Homologação: branch homolog → https://doca-livre-wms-pro-homologacao.onrender.com
#
# Link único do usuário = https://wms.docalivre.com.br/ (Plus).
# Outros links (Pro/Light) redirecionam para esse portal.
#
# Obrigatório no Dashboard Render (Environment) nos 2 serviços:
#   SSO_SECRET = mesma chave longa nos dois + no Supabase Light (Edge Function sso-entrar)
# Cadastro/trocar senha por e-mail — OBRIGATÓRIO no Pro (prod e homolog):
#   SMTP_HOST=smtp.gmail.com
#   SMTP_PORT=587
#   SMTP_USER=seuemail@gmail.com
#   SMTP_PASSWORD=senha de app (16 caracteres)
#   SMTP_FROM=seuemail@gmail.com
#   SMTP_USE_TLS=1
# Sem isso o código NÃO vai por e-mail. Não use PORTAL_OTP_DEBUG em produção.

services:
  # ── Produção ──────────────────────────────────────────────────────────────
  - type: web
    name: doca-livre-wms-pro
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: producao
      - key: SECRET_KEY
        generateValue: true
      - key: SSO_SECRET
        sync: false
      - key: PORTAL_PUBLIC_URL
        value: https://wms.docalivre.com.br/
      - key: SYSTEM_URL_LIGHT
        value: https://doca-livre-wms-light.onrender.com/
      - key: SYSTEM_URL_PLUS
        value: https://wms.docalivre.com.br/
      - key: SYSTEM_URL_PRO
        value: https://doca-livre-wms-pro.onrender.com/
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false

  # ── Homologação ───────────────────────────────────────────────────────────
  - type: web
    name: doca-livre-wms-pro-homologacao
    env: python
    plan: free
    region: oregon
    branch: homolog
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: homologacao
      - key: SECRET_KEY
        generateValue: true
      - key: SSO_SECRET
        sync: false
      - key: PORTAL_PUBLIC_URL
        value: https://ultrafrio-homologacao.onrender.com/
      - key: SYSTEM_URL_LIGHT
        value: https://doca-livre-wms-light-homolog.onrender.com/
      - key: SYSTEM_URL_PLUS
        value: https://ultrafrio-homologacao.onrender.com/
      - key: SYSTEM_URL_PRO
        value: https://doca-livre-wms-pro-homologacao.onrender.com/
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false
