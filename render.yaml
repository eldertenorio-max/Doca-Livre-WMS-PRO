services:
  - type: web
    name: controle-de-carregamento
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 1 worker: app Flask grande (15k+ linhas) estourava RAM no free tier e derrubava o serviço
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --worker-class gthread --threads 4 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: RAVEX_USER
        sync: false
      - key: RAVEX_PASSWORD
        sync: false
