{# Logo Stock System inline — evita falha de carregamento do SVG externo em img #}
{% macro stock_system_logo(class='', grad_id='ssg') %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" role="img" aria-label="{{ system_name }}"{% if class %} class="{{ class }}"{% endif %}>
  <defs>
    <linearGradient id="{{ grad_id }}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
  </defs>
  <rect x="4" y="12" width="64" height="64" rx="14" fill="url(#{{ grad_id }})"/>
  <path d="M22 48h28M22 38h20M22 58h24" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <rect x="38" y="30" width="18" height="18" rx="3" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="84" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Stock</text>
  <text x="84" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0369a1">System</text>
  <text x="84" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="2">WMS</text>
</svg>
{% endmacro %}
