<div id="portal-entry" class="portal-stage system-entry" role="main" hidden>
    <button type="button" class="portal-back-btn" data-portal-back>
        <span class="portal-back-btn__icon" aria-hidden="true">←</span>
        Voltar
    </button>
    <div class="system-entry__inner">
        <div id="portal-entry-brand" class="system-entry__brand"></div>
        <p class="system-entry__hint">Você será direcionado para o ambiente de produção.</p>
        <button type="button" class="system-entry__enter" id="portal-entry-enter">Acessar</button>
        <span id="portal-entry-title" class="visually-hidden"></span>
    </div>
</div>
