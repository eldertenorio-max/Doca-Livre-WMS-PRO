<div id="portal-splash" class="intro-splash company-splash portal-splash" role="dialog" aria-label="Doca Livre Sistemas" aria-live="polite" aria-busy="true">
    <div class="intro-content company-splash__content">
        <div class="company-splash__brand">
            <img src="{{ url_for('static', filename='logo-doca-livre.png') }}" alt="" class="company-splash__logo intro-logo">
            <p class="company-splash__title">Doca Livre Sistemas</p>
        </div>
        {% if is_homologacao %}
        <p class="intro-ambiente intro-ambiente--homolog">Homologação</p>
        {% endif %}
        <div class="intro-progress-wrap">
            <div class="intro-progress-track">
                <div class="intro-progress-bar" id="portal-splash-bar"></div>
            </div>
            <span class="intro-progress-label">Carregando… <span id="portal-splash-pct">0</span>%</span>
        </div>
    </div>
</div>
