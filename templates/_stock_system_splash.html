{# Intro Stock System — 2 telas: (1) logo SVG  (2) título+tagline+barra #}
{% from '_stock_system_logo.html' import stock_system_logo %}
<script>try{if(sessionStorage.getItem('stock_system_intro_v2')==='1'){document.documentElement.classList.add('ss-splash-skip');}}catch(e){}</script>
<div id="stock-system-splash" class="ss-splash" role="dialog" aria-label="Carregando {{ system_name }}" aria-live="polite">
    <div class="ss-splash-step ss-splash-step--logo ss-splash-step--active" aria-hidden="false">
        <div class="ss-splash-logo-wrap">
            {{ stock_system_logo(class='ss-splash-logo', grad_id='ssg-splash') }}
        </div>
    </div>

    <div class="ss-splash-step ss-splash-step--load" aria-hidden="true">
        <div class="ss-splash-load-inner">
            <p class="ss-splash-tagline">{{ system_tagline }}</p>
            <div class="ss-splash-loader" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div class="ss-splash-loader-bar"></div>
            </div>
        </div>
    </div>
</div>
