<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} — Módulos</title>
    <link rel="icon" href="{{ url_for('static', filename='stock-system-logo.svg') }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='stock-system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='entrada-modulos.css') }}">
    <script src="{{ url_for('static', filename='stock-system-reload-login.js') }}"></script>
</head>
<body class="hub-entrada-body">
    {% from '_stock_system_logo.html' import stock_system_logo %}
    <div class="hub-entrada-topstripe" aria-hidden="true"></div>

    <div class="hub-entrada-wrap">
        <div class="hub-entrada-logo">
            {{ stock_system_logo(grad_id='ssg-hub') }}
        </div>
        <p class="hub-entrada-subtitulo">{{ system_tagline }}</p>

        <div class="hub-entrada-botoes">
            <a class="hub-entrada-btn hub-entrada-btn--1" href="{{ url_for('painel') }}?modulo=carregamento">Carga/Expedição</a>
            <a class="hub-entrada-btn hub-entrada-btn--2" href="{{ url_for('painel') }}?modulo=devolucoes">Retorno</a>
            <a class="hub-entrada-btn hub-entrada-btn--3" href="{{ url_for('painel') }}?modulo=terceiros">Descarga/Recebimento</a>
            <a class="hub-entrada-btn hub-entrada-btn--4" href="{{ url_for('painel') }}?modulo=estoque-sp">Estoque</a>
            <a class="hub-entrada-btn hub-entrada-btn--5" href="{{ url_for('painel') }}?modulo=enderecamento-wms">Endereçamento WMS</a>
        </div>

        <footer class="hub-entrada-rodape">
            Logado como <strong>{{ usuario or '—' }}</strong>
            ·
            <a href="/login?sair=1">Sair</a>
        </footer>
    </div>
</body>
</html>
