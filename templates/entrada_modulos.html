<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Carregamento — Módulos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container container-entrada-modulos">
        <header class="header">
            <h1>CONTROLE DE CARREGAMENTO ULTRAPÃO</h1>
            <div class="header-perfil">
                <span class="perfil-label">Logado como:</span>
                <span class="perfil-usuario">{{ usuario or '—' }}</span>
            </div>
            <a href="/login?sair=1" class="btn-sair" title="Sair">Sair</a>
        </header>

        <nav class="modulos-bar" aria-label="Módulos do sistema">
            <a class="modulo-button active" href="{{ url_for('painel') }}?modulo=carregamento">Carregamento (expedição)</a>
            <a class="modulo-button" href="{{ url_for('painel') }}?modulo=devolucoes">Devoluções</a>
            <a class="modulo-button" href="{{ url_for('painel') }}?modulo=terceiros">Recebimento e expedição de terceiros</a>
        </nav>
    </div>
</body>
</html>
