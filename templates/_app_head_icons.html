{# Ícones PWA — WMS DOCA LIVRE PRO (mesmo padrão Ultrafrio) #}
{% macro app_head_icons() %}
<link rel="icon" href="{{ url_for('static', filename='favicon-doca.svg') }}" type="image/svg+xml">
<link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" sizes="192x192" type="image/png">
<link rel="icon" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}" sizes="32x32" type="image/png">
<link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" sizes="any">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
<link rel="manifest" href="{{ url_for('manifest_app') }}">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="{{ system_short_name }}">
<meta name="application-name" content="{{ system_short_name }}">
{% endmacro %}
